<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>隐私政策 & 用户协议 - AUV 您吃了么</title>
    <style>
        :root {
            /* 浅色模式 */
            --bg: #F5F5F7;
            --surface: #FFFFFF;
            --nav-bg: #FFFFFF;
            --divider: #E8E8EA;
            --text-primary: #1A1A1F;
            --text-body: #3C3C43;
            --text-caption: #8E8E93;
            --brand-color: #E74C3C;
            --agreement-accent: #2563EB;
            --doc-accent: var(--brand-color);
            --doc-accent-light: #FFF0F1;
            --safe-top: 24px;
            --scrollbar-thumb: #C8C8CC;
            --scrollbar-track: transparent;
            --shadow-banner: 0 1px 3px rgba(0, 0, 0, 0.06);
            --page-enter-offset: 40px;
            --page-enter-opacity: 0;
        }

        /* 深色模式 */
        :root.dark {
            --bg: #1A1A1F;
            --surface: #1E1E24;
            --nav-bg: #1E1E24;
            --divider: #2A2A2F;
            --text-primary: #E0E0E5;
            --text-body: #A0A0A5;
            --text-caption: #6B6B70;
            --scrollbar-thumb: #3A3A40;
            --scrollbar-track: #1A1A1F;
            --shadow-banner: 0 1px 3px rgba(0, 0, 0, 0.3);
        }

        /* 协议类型下的 accent 色覆盖 */
        :root.doc-agreement {
            --doc-accent: #2563EB;
            --doc-accent-light: #EFF6FF;
        }
        :root.doc-agreement.dark {
            --doc-accent: #2563EB;
            --doc-accent-light: #1A2A4A;
        }
        :root.doc-privacy {
            --doc-accent: #E74C3C;
            --doc-accent-light: #FFF0F1;
        }
        :root.doc-privacy.dark {
            --doc-accent: #E74C3C;
            --doc-accent-light: #2A1215;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', 'Helvetica Neue', sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            -webkit-tap-highlight-color: transparent;
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--bg);
            color: var(--text-primary);
            min-height: 100vh;
            min-height: -webkit-fill-available;
            overflow-x: hidden;
            transition: background-color 0.35s ease, color 0.35s ease;
            /* 页面进入动画 */
            animation: pageSlideIn 0.32s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
            /* 支持安全区域 */
            padding-top: env(safe-area-inset-top, 0px);
        }

        /* 页面滑入动画 */
        @keyframes pageSlideIn {
            from {
                opacity: 0;
                transform: translateX(36px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* 文档切换时的脉冲动画 */
        @keyframes contentPulse {
            0% {
                opacity: 0.45;
                transform: translateY(6px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .content-pulse {
            animation: contentPulse 0.28s ease-out forwards;
        }

        /* 主容器 */
        .app-container {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            min-height: -webkit-fill-available;
            max-width: 560px;
            margin: 0 auto;
            width: 100%;
            position: relative;
        }

        /* ─── 导航栏 ─────────────────────── */
        .nav-bar {
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            width: 100%;
            height: calc(var(--safe-top) + 44px);
            padding-top: var(--safe-top);
            padding-left: 4px;
            padding-right: 4px;
            background-color: var(--nav-bg);
            border-bottom: 0.5px solid var(--divider);
            transition: background-color 0.35s ease, border-color 0.35s ease;
            /* 顶部安全区域已由body的padding-top处理，这里再微调 */
            margin-top: calc(env(safe-area-inset-top, 0px) * -1);
            padding-top: calc(var(--safe-top) + env(safe-area-inset-top, 0px));
        }
        /* 在body已有padding-top的情况下，nav-bar的sticky需要调整 */
        body {
            padding-top: 0;
        }
        .nav-bar {
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            width: 100%;
            height: calc(env(safe-area-inset-top, 24px) + 44px);
            padding-top: env(safe-area-inset-top, 24px);
            padding-left: 4px;
            padding-right: 4px;
            background-color: var(--nav-bg);
            border-bottom: 0.5px solid var(--divider);
            transition: background-color 0.35s ease, border-color 0.35s ease;
        }

        .nav-back-btn {
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-radius: 10px;
            flex-shrink: 0;
            transition: background-color 0.2s ease;
            -webkit-user-select: none;
            user-select: none;
            border: none;
            background: transparent;
            color: var(--text-primary);
            font-size: 20px;
            line-height: 1;
        }
        .nav-back-btn:hover {
            background-color: rgba(128, 128, 128, 0.1);
        }
        .nav-back-btn:active {
            background-color: rgba(128, 128, 128, 0.18);
            transform: scale(0.94);
            transition: transform 0.1s ease;
        }
        .nav-back-btn svg {
            width: 20px;
            height: 20px;
            stroke: var(--text-primary);
            fill: none;
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-linejoin: round;
            transition: stroke 0.35s ease;
        }

        .nav-title {
            flex: 1;
            text-align: center;
            font-size: 15px;
            font-weight: 500;
            color: var(--text-primary);
            transition: color 0.35s ease;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .nav-spacer {
            width: 44px;
            flex-shrink: 0;
        }

        /* ─── 滚动区域 ──────────────────── */
        .scroll-area {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
            overscroll-behavior: contain;
            scroll-behavior: smooth;
        }
        .scroll-area::-webkit-scrollbar {
            width: 4px;
        }
        .scroll-area::-webkit-scrollbar-track {
            background: var(--scrollbar-track);
        }
        .scroll-area::-webkit-scrollbar-thumb {
            background: var(--scrollbar-thumb);
            border-radius: 4px;
        }
        .scroll-area {
            scrollbar-width: thin;
            scrollbar-color: var(--scrollbar-thumb) var(--scrollbar-track);
        }

        .scroll-content {
            display: flex;
            flex-direction: column;
            width: 100%;
        }

        /* ─── Banner ────────────────────── */
        .doc-banner-wrapper {
            width: 100%;
            background-color: var(--surface);
            transition: background-color 0.35s ease;
            box-shadow: var(--shadow-banner);
        }
        .doc-banner {
            display: flex;
            flex-direction: column;
            gap: 14px;
            padding: 24px 24px 22px;
            width: 100%;
        }
        .banner-header-row {
            display: flex;
            align-items: center;
            gap: 14px;
            width: 100%;
        }
        .banner-icon-box {
            width: 54px;
            height: 54px;
            border-radius: 14px;
            background-color: var(--doc-accent-light);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: background-color 0.4s ease;
        }
        .banner-icon {
            font-size: 28px;
            line-height: 1;
        }
        .banner-title-group {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 5px;
            min-width: 0;
        }
        .banner-title {
            font-size: 26px;
            font-weight: 700;
            color: var(--text-primary);
            transition: color 0.35s ease;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .banner-date {
            font-size: 12px;
            color: var(--text-caption);
            transition: color 0.35s ease;
        }
        .banner-subtitle {
            font-size: 13px;
            color: var(--text-caption);
            line-height: 21px;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-overflow: ellipsis;
            width: 100%;
            transition: color 0.35s ease;
        }
        .banner-divider {
            width: 100%;
            height: 0.5px;
            background-color: var(--divider);
            transition: background-color 0.35s ease;
            border: none;
        }

        /* ─── 条款列表容器 ─────────────── */
        .sections-container {
            width: 100%;
            margin-top: 8px;
            margin-bottom: 8px;
            background-color: var(--surface);
            border-radius: 0;
            transition: background-color 0.35s ease;
            box-shadow: var(--shadow-banner);
        }

        /* ─── 单条条款 ────────────────── */
        .section-item {
            width: 100%;
            background-color: var(--surface);
            transition: background-color 0.35s ease;
        }
        .section-inner {
            padding: 20px 24px 22px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .section-heading-row {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
        }
        .section-accent-bar {
            width: 3px;
            height: 17px;
            background-color: var(--doc-accent);
            border-radius: 2px;
            flex-shrink: 0;
            transition: background-color 0.4s ease;
        }
        .section-heading {
            font-size: 15px;
            font-weight: 500;
            color: var(--text-primary);
            flex: 1;
            transition: color 0.35s ease;
        }
        .section-body {
            font-size: 14px;
            color: var(--text-body);
            line-height: 26px;
            white-space: pre-line;
            width: 100%;
            transition: color 0.35s ease;
        }
        .section-divider {
            width: calc(100% - 24px);
            margin-left: 24px;
            height: 0.5px;
            background-color: var(--divider);
            border: none;
            transition: background-color 0.35s ease;
        }
        .section-item:last-child .section-divider {
            display: none;
        }

        /* ─── 页脚 ────────────────────── */
        .doc-footer {
            width: 100%;
            background-color: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            padding: 16px 24px 48px;
            transition: background-color 0.35s ease;
        }
        .footer-divider {
            width: 100%;
            height: 0.5px;
            background-color: var(--divider);
            border: none;
            transition: background-color 0.35s ease;
        }
        .footer-text {
            font-size: 12px;
            color: var(--text-caption);
            text-align: center;
            width: 100%;
            padding-top: 4px;
            transition: color 0.35s ease;
        }
        .footer-switch-link {
            display: inline-block;
            margin-top: 10px;
            font-size: 12px;
            color: var(--doc-accent);
            cursor: pointer;
            text-decoration: none;
            transition: color 0.35s ease, opacity 0.2s ease;
            -webkit-user-select: none;
            user-select: none;
            border: none;
            background: transparent;
            padding: 6px 14px;
            border-radius: 14px;
        }
        .footer-switch-link:hover {
            opacity: 0.75;
        }
        .footer-switch-link:active {
            opacity: 0.5;
            transform: scale(0.96);
        }

        /* ─── 主题切换浮动按钮 ──────────── */
        .theme-toggle {
            position: fixed;
            bottom: 28px;
            right: 20px;
            z-index: 200;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background-color: var(--surface);
            border: 0.5px solid var(--divider);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.12);
            transition: all 0.35s ease;
            -webkit-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            outline: none;
        }
        .theme-toggle:hover {
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.18);
            transform: translateY(-2px);
        }
        .theme-toggle:active {
            transform: scale(0.9);
            transition: transform 0.12s ease;
        }
        @media (min-width: 600px) {
            .theme-toggle {
                right: calc(50% - 280px + 20px);
            }
        }

        /* ─── 响应式微调 ────────────────── */
        @media (max-width: 380px) {
            .banner-title {
                font-size: 22px;
            }
            .banner-icon-box {
                width: 46px;
                height: 46px;
                border-radius: 12px;
            }
            .banner-icon {
                font-size: 24px;
            }
            .section-inner {
                padding: 16px 16px 18px;
            }
            .section-divider {
                width: calc(100% - 16px);
                margin-left: 16px;
            }
            .doc-banner {
                padding: 20px 16px 18px;
            }
            .doc-footer {
                padding: 14px 16px 40px;
            }
        }
    </style>
</head>

            // ─── DOM 引用 ──────────────────────────────────────────────
            const rootEl = document.documentElement;
            const navTitle = document.getElementById('navTitle');
            const bannerIcon = document.getElementById('bannerIcon');
            const bannerTitle = document.getElementById('bannerTitle');
            const bannerDate = document.getElementById('bannerDate');
            const bannerSubtitle = document.getElementById('bannerSubtitle');
            const bannerIconBox = document.getElementById('bannerIconBox');
            const sectionsContainer = document.getElementById('sectionsContainer');
            const footerText = document.getElementById('footerText');
            const footerSwitchLink = document.getElementById('footerSwitchLink');
            const themeToggle = document.getElementById('themeToggle');
            const navBackBtn = document.getElementById('navBackBtn');
            const scrollArea = document.getElementById('scrollArea');
            const scrollContent = document.getElementById('scrollContent');

            // ─── 状态 ──────────────────────────────────────────────────
            let currentDoc = PRIVACY_DOC;
            let isDark = false;

            // ─── 主题检测 ──────────────────────────────────────────────
            function getSystemDark() {
                return window.matchMedia('(prefers-color-scheme: dark)').matches;
            }

            function getStoredTheme() {
                try {
                    return localStorage.getItem('auv-legal-theme');
                } catch (e) {
                    return null;
                }
            }

            function setStoredTheme(theme) {
                try {
                    localStorage.setItem('auv-legal-theme', theme);
                } catch (e) {
                    // 忽略存储错误
                }
            }

            function calcIsDark() {
                const stored = getStoredTheme();
                if (stored === 'dark') return true;
                if (stored === 'light') return false;
                return getSystemDark();
            }

            function applyTheme() {
                isDark = calcIsDark();
                if (isDark) {
                    rootEl.classList.add('dark');
                    themeToggle.textContent = '☀️';
                } else {
                    rootEl.classList.remove('dark');
                    themeToggle.textContent = '🌙';
                }
            }

            function toggleTheme() {
                const currentStored = getStoredTheme();
                if (currentStored === 'dark') {
                    setStoredTheme('light');
                } else if (currentStored === 'light') {
                    setStoredTheme(null); // 恢复系统默认
                } else {
                    // 当前是系统默认，根据系统状态切换
                    if (getSystemDark()) {
                        setStoredTheme('light');
                    } else {
                        setStoredTheme('dark');
                    }
                }
                applyTheme();
            }

            // ─── 文档类型 class 切换 ────────────────────────────────────
            function setDocClass(docType) {
                rootEl.classList.remove('doc-privacy', 'doc-agreement');
                if (docType === 'agreement') {
                    rootEl.classList.add('doc-agreement');
                } else {
                    rootEl.classList.add('doc-privacy');
                }
            }

            // ─── 渲染条款列表 ──────────────────────────────────────────
            function renderSections(sections) {
                sectionsContainer.innerHTML = '';
                sections.forEach((section, index) => {
                    const isLast = index === sections.length - 1;
                    const itemDiv = document.createElement('div');
                    itemDiv.className = 'section-item';

                    const innerDiv = document.createElement('div');
                    innerDiv.className = 'section-inner';

                    const headingRow = document.createElement('div');
                    headingRow.className = 'section-heading-row';

                    const accentBar = document.createElement('div');
                    accentBar.className = 'section-accent-bar';

                    const headingSpan = document.createElement('span');
                    headingSpan.className = 'section-heading';
                    headingSpan.textContent = section.heading;

                    headingRow.appendChild(accentBar);
                    headingRow.appendChild(headingSpan);

                    const bodyP = document.createElement('p');
                    bodyP.className = 'section-body';
                    bodyP.textContent = section.body;

                    innerDiv.appendChild(headingRow);
                    innerDiv.appendChild(bodyP);
                    itemDiv.appendChild(innerDiv);

                    if (!isLast) {
                        const divider = document.createElement('hr');
                        divider.className = 'section-divider';
                        itemDiv.appendChild(divider);
                    }

                    sectionsContainer.appendChild(itemDiv);
                });
            }

            // ─── 更新页面内容 ──────────────────────────────────────────
            function updatePageContent(doc, animate = false) {
                currentDoc = doc;
                setDocClass(doc.type);
                navTitle.textContent = doc.title;
                bannerIcon.textContent = doc.icon;
                bannerTitle.textContent = doc.title;
                bannerDate.textContent = doc.effectiveDate;
                bannerSubtitle.textContent = doc.subtitle;
                footerText.textContent = doc.footer;
                renderSections(doc.sections);

                // 更新切换链接文字
                if (doc.type === 'privacy') {
                    footerSwitchLink.textContent = '查看用户协议 →';
                } else {
                    footerSwitchLink.textContent = '查看隐私政策 →';
                }

                // 动画
                if (animate) {
                    scrollContent.classList.remove('content-pulse');
                    void scrollContent.offsetWidth; // 强制回流
                    scrollContent.classList.add('content-pulse');
                    // 滚动到顶部
                    scrollArea.scrollTo({ top: 0, behavior: 'smooth' });
                }

                // 更新URL参数（不刷新页面）
                const url = new URL(window.location);
                if (doc.type === 'agreement') {
                    url.searchParams.set('doc', 'agreement');
                } else {
                    url.searchParams.delete('doc');
                }
                window.history.replaceState({}, '', url.toString());
            }

            // ─── 切换文档类型 ──────────────────────────────────────────
            function switchDocument() {
                const newDoc = currentDoc.type === 'privacy' ? AGREEMENT_DOC : PRIVACY_DOC;
                updatePageContent(newDoc, true);
            }

            // ─── 返回处理 ──────────────────────────────────────────────
            function handleBack() {
                // 先尝试返回上一页
                if (window.history.length > 1 && document.referrer) {
                    window.history.back();
                } else {
                    // 没有历史记录，显示提示或跳转
                    alert('没有上一页可返回。在实际应用中，此处会导航回设置页面。');
                }
            }

            // ─── 初始化 ────────────────────────────────────────────────
            function init() {
                // 应用主题
                applyTheme();

                // 读取URL参数确定初始文档类型
                const urlParams = new URLSearchParams(window.location.search);
                const docParam = urlParams.get('doc');
                const initialDoc = docParam === 'agreement' ? AGREEMENT_DOC : PRIVACY_DOC;

                // 渲染初始内容
                updatePageContent(initialDoc, false);

                // 事件监听
                themeToggle.addEventListener('click', toggleTheme);
                footerSwitchLink.addEventListener('click', switchDocument);
                navBackBtn.addEventListener('click', handleBack);

                // 监听系统主题变化
                window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
                    const stored = getStoredTheme();
                    if (stored === null) {
                        applyTheme();
                    }
                });

                // 键盘快捷键：按 Escape 返回
                document.addEventListener('keydown', (e) => {
                    if (e.key === 'Escape') {
                        handleBack();
                    }
                });

                console.log('📄 法律文档阅读页已就绪');
                console.log('  当前文档:', initialDoc.title);
                console.log('  主题模式:', isDark ? '深色' : '浅色');
                console.log('  切换文档: 点击页脚链接');
                console.log('  切换主题: 点击右下角按钮');
                console.log('  返回: 点击左上角箭头或按 Esc 键');
                console.log('  URL参数: ?doc=agreement 查看用户协议');
            }

            // ─── 启动 ──────────────────────────────────────────────────
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }
        })();
    </script>
